<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="shieldL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a4fa8"/>
      <stop offset="100%" stop-color="#1e6fcf"/>
    </linearGradient>
    <linearGradient id="shieldR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="eyeG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0d0ff" stop-opacity="0.95"/>
    </linearGradient>
    <clipPath id="leftHalf"><rect x="0" y="0" width="60" height="120"/></clipPath>
    <clipPath id="rightHalf"><rect x="60" y="0" width="60" height="120"/></clipPath>
  </defs>

  <!-- Shield left half -->
  <path d="M60 8 L18 26 L18 62 C18 84 36 102 60 112 Z" fill="url(#shieldL)"/>
  <!-- Shield right half -->
  <path d="M60 8 L102 26 L102 62 C102 84 84 102 60 112 Z" fill="url(#shieldR)"/>

  <!-- Shield border -->
  <path d="M60 10 L20 27 L20 63 C20 84 37 101 60 111 C83 101 100 84 100 63 L100 27 Z"
        fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Binary digits on right side -->
  <g font-family="monospace" font-size="7" fill="rgba(255,255,255,0.3)" clip-path="url(#rightHalf)">
    <text x="68" y="35">10110</text>
    <text x="72" y="45">01001</text>
    <text x="66" y="55">11010</text>
    <text x="70" y="65">00110</text>
    <text x="68" y="75">10101</text>
    <text x="74" y="85">01100</text>
  </g>

  <!-- Medical cross (left side) -->
  <g clip-path="url(#leftHalf)">
    <rect x="30" y="42" width="22" height="7" rx="3" fill="white" opacity="0.9"/>
    <rect x="37" y="35" width="7" height="22" rx="3" fill="white" opacity="0.9"/>
    <!-- lightning bolt overlay -->
    <path d="M38 52 L42 44 L40 49 L44 49 L40 57 L42 52 Z" fill="#fbbf24" opacity="0.95"/>
  </g>

  <!-- Eye (center-right) -->
  <ellipse cx="68" cy="62" rx="18" ry="11" fill="none" stroke="url(#eyeG)" stroke-width="2.5"/>
  <circle cx="68" cy="62" r="6" fill="white" opacity="0.15"/>
  <circle cx="68" cy="62" r="5" fill="#1e1b4b"/>
  <circle cx="68" cy="62" r="3" fill="#7c3aed"/>
  <circle cx="70" cy="60" r="1.2" fill="white" opacity="0.8"/>

  <!-- Divider line -->
  <line x1="60" y1="15" x2="60" y2="108" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
</svg>
