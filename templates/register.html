<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – MedIntel</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body class="auth-body">

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="brand">
      <img src="/static/logo.svg" class="brand-logo" alt="MedIntel"/>
      <div class="brand-text">
        <span class="brand-name">MedIntel</span>
        <span class="brand-sub">AI Prescription Explainer</span>
      </div>
    </a>
    <div class="header-right">
      <span style="font-size:13px;color:#4b5c75">Already registered?</span>
      <a href="/login" class="btn-ghost">Log In</a>
    </div>
  </div>
</header>

<main class="auth-main">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="/static/logo.svg" class="auth-logo-img" alt="MedIntel Logo"/>
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-sub">Free — no credit card required</p>
    </div>

    {% if error %}
    <div class="auth-error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/register" class="auth-form">
      <div class="form-group">
        <label class="form-label">Full name</label>
        <input type="text" name="name" class="form-input"
               placeholder="Jane Doe" required value="{{ name or '' }}"/>
      </div>

      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-input"
               placeholder="you@example.com" required
               value="{{ email or '' }}" autocomplete="email"/>
      </div>

      <div class="form-group">
        <label class="form-label">
          Password
          <span style="color:#4b5c75;font-size:11px;font-weight:400;margin-left:6px">min. 6 characters</span>
        </label>
        <div class="pw-wrap">
          <input type="password" name="password" id="reg-pw" class="form-input"
                 placeholder="••••••••" required autocomplete="new-password"/>
          <button type="button" class="pw-toggle" onclick="togglePw('reg-pw', this)" aria-label="Show/hide password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm password</label>
        <div class="pw-wrap">
          <input type="password" name="confirm" id="reg-pw2" class="form-input"
                 placeholder="••••••••" required autocomplete="new-password"/>
          <button type="button" class="pw-toggle" onclick="togglePw('reg-pw2', this)" aria-label="Show/hide password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-auth">Create Account →</button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="/login">Log in</a>
    </p>
  </div>
</main>

<script>
function togglePw(inputId, btn) {
  const input = document.getElementById(inputId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btn.style.color = isHidden ? 'var(--cyan)' : '';
  btn.querySelector('svg').innerHTML = isHidden
    ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
}
</script>
</body>
</html>
